<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interface desktop pour programmer RobotPi">

    <title>RobotPi IDE - Blockly</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">

    <script src="https://cdn.jsdelivr.net/gh/google/code-prettify@master/loader/run_prettify.js"></script>
    
    <!-- Blockly en local -->
    <script src="../node_modules/blockly/blockly_compressed.js"></script>
    <script src="../node_modules/blockly/blocks_compressed.js"></script>
    <script src="../node_modules/blockly/javascript_compressed.js"></script>
    <script src="../node_modules/blockly/python_compressed.js"></script>
    <script src="../node_modules/blockly/msg/fr.js"></script>

    <script src="js/blockly/toolbox.js"></script>

    <script src="js/blockly/blocks/mouvements.js"></script>
    <script src="js/blockly/blocks/capteurs.js"></script>
    <script src="js/blockly/blocks/lumieres.js"></script>
    <script src="js/blockly/blocks/bouton.js"></script>
    <script src="js/blockly/blocks/attendre.js"></script>

    <script src="js/blockly/generators/python_mouvements.js"></script>
    <script src="js/blockly/generators/python_capteurs.js"></script>
    <script src="js/blockly/generators/python_lumieres.js"></script>
    <script src="js/blockly/generators/python_bouton.js"></script>
    <script src="js/blockly/generators/python_attendre.js"></script>

    <script src="js/config.js"></script>
    <script src="js/editor/RobotPiEditor.js"></script>
       
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <h1 class="logo">🤖 RobotPi IDE - Blockly</h1>
            <span class="version">v1.0</span>
        </div>
        
        <div class="toolbar">
            <button class="btn btn-primary" id="generateBtn">
                <span class="icon">⚡</span>
                Générer Python
            </button>
            <button class="btn btn-secondary" id="clearBtn">
                <span class="icon">🗑️</span>
                Effacer
            </button>
            <button class="btn btn-success" id="uploadBtn" disabled>
                <span class="icon">📤</span>
                Téléverser
            </button>
            <button class="btn btn-secondary" id="filesBtn">
                <span class="icon">📂</span>
                Fichiers
            </button>
            <button class="btn btn-secondary" id="saveBtn">
                <span class="icon">💾</span>
                Sauvegarder
            </button>
            <button class="btn btn-secondary" id="loadBtn">
                <span class="icon">📂</span>
                Charger
            </button>
            <!--<button class="btn btn-secondary" id="configBtn">
                <span class="icon">⚙️</span>
                Config
            </button>-->
            <button class="btn btn-secondary" id="installLibBtn" title="Installer robotPi.py sur le Pico">
                <span class="icon">📚</span>
                Installer Lib
            </button>
        </div>

        <div class="connection-panel">
            <select id="portSelect" class="port-select">
                <option value="">Sélectionner port série...</option>
            </select>
            <button class="btn btn-icon" id="refreshPortsBtn" title="Actualiser">
                🔄
            </button>
        </div>
    </header>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Blockly Panel -->
        <div class="blockly-panel">
            <div class="panel-header">
                <h2>📦 Blocs de programmation</h2>
            </div>
            <div id="blocklyDiv"></div>
        </div>

        <!-- Code Panel -->
        <div class="code-panel">
            <div class="panel-header">
                <h2>🐍 Code Python généré</h2>
                <div class="python-actions">
                    <button class="btn-icon" id="copyCodeBtn" title="Copier le code">
                        📋
                    </button>
                    <button class="btn-icon" id="downloadCodeBtn" title="Télécharger">
                        ⬇️
                    </button>
                </div>    
            </div>
         <div class="code-editor-container">
                <textarea id="pythonCode" readonly class="code-editor" spellcheck="false"># Le code Python apparaîtra ici
                </textarea>
        </div>

         <!-- Console -->
            <div class="console-container">
                <div class="console-header">
                    <h3>📟 Console</h3>
                    <button class="btn-icon" onclick="toggleSerialMonitor()">📡 Moniteur série</button>
                    <button class="btn-icon" id="resetBtn">🔄 Reset Pico Pi W</button>
                    <button class="btn-icon" id="clearConsoleBtn" title="Effacer">
                        🗑️
                    </button>
                </div>
                <div class="console" id="console">
                    <div class="console-line info">
                        <span class="console-time">[00:00:00]</span>
                        <span class="console-text">Console prête - Version Blockly</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-item">
            <span>🖥️</span>
            <span>RobotPi Desktop - Blockly</span>
        </div>
        <div class="status-item" id="portInfo">
            <span>🔌</span>
            <span>Aucun port</span>
        </div>
        <div class="status-item" id="blockCount">
            <span>📦</span>
            <span>0 blocs</span>
        </div>
    </div>


    <div class="modal" id="fileExplorerModal">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2>📂 Fichiers sur le Pico</h2>
                <button class="modal-close" onclick="if(typeof uiManager !== 'undefined') uiManager.toggleModal('fileExplorerModal', false); else document.getElementById('fileExplorerModal').classList.remove('active');">×</button>
            </div>
            <div class="modal-body">
                <div id="picoFilesList" class="files-list">
                    <div class="loading">Chargement...</div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="if(typeof uiManager !== 'undefined') uiManager.toggleModal('fileExplorerModal', false); else document.getElementById('fileExplorerModal').classList.remove('active');">Fermer</button>
            </div>
        </div>
    </div>

</body>
</html>
